{% extends 'base.html' %}
{% block title %}Register — TaskMate{% endblock %}

{% block extra_styles %}
<style>
  .auth-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background: var(--bg);
    position: relative;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 40px 32px;
  }
  .auth-logo {
    font-size: 18px; font-weight: 700;
    color: var(--text); letter-spacing: -.01em; margin-bottom: 6px;
  }
  .auth-tagline { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block; font-size: 12px;
    color: var(--muted); margin-bottom: 8px;
    font-weight: 600;
  }
  .form-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text);
    font-size: 14px;
    transition: border-color .2s, box-shadow .2s; outline: none;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(143,180,255,.12);
  }
  .form-input::placeholder { color: var(--muted); }
  .auth-submit {
    width: 100%; justify-content: center; padding: 13px;
    font-size: 15px; margin-top: 8px; border-radius: 10px;
    background: var(--accent); color: #0b0d10;
  }
  .auth-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }
  .auth-footer a { color: var(--accent); font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">TaskMate</div>
    <p class="auth-tagline">Create your account.</p>

    {% for message in messages %}
      <div class="flash flash-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="post" autocomplete="on">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="your_username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email <span style="color:var(--muted);font-size:10px">(optional)</span></label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="min 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" name="password2" placeholder="repeat password" required>
      </div>
      <button type="submit" class="btn auth-submit">Create account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/accounts/login/">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
